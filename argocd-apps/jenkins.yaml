apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.jenkins.io
    chart: jenkins
    targetRevision: 5.7.17
    helm:
      values: |
        controller:
          serviceType: ClusterIP
          ingress:
            enabled: true
            ingressClassName: nginx
            hostName: jenkins.localhost
          admin:
            username: admin
          installPlugins: false
          podSecurityContextOverride:
            runAsUser: 1000
            fsGroup: 1000
            runAsNonRoot: true
        persistence:
          enabled: true
          size: 8Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
