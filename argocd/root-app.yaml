  apiVersion: argoproj.io/v1alpha1
  kind: Application
  metadata:
    name: root-app
    namespace: argocd
  spec:
    project: default
    source:
      repoURL: git@github.com:samael-1982/spring-petclinic.git
      targetRevision: main
      path: argocd-apps
    destination:
      server: https://kubernetes.default.svc
      namespace: argocd
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
